name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Branch is chosen in the Actions UI when clicking "Run workflow"
          ref: ${{ github.ref }}
          fetch-depth: 0
          # IMPORTANT: disable persist-credentials to avoid using the default GITHUB_TOKEN
          persist-credentials: false

      # Step to generate an installation token from the GitHub App
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: alto9
          repositories: |
            kube9-vscode

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:unit
        continue-on-error: true

      - name: Package extension (pre-release)
        run: npm run package

      - name: Run semantic-release
        id: semantic-release
        env:
          # Use the token generated by the previous step
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: npx semantic-release

      - name: Re-package extension (post-release)
        if: success() && hashFiles('.semantic-release-success') != ''
        run: |
          # Clean up old VSIX files to ensure we publish the correct version
          rm -f *.vsix
          npm run package

      - name: Publish to VS Code Marketplace
        if: success() && hashFiles('.semantic-release-success') != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is not set. Add it as a repository secret to publish." >&2
            exit 1
          fi
          # Get package name and version from package.json to construct correct VSIX filename
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          VSIX_FILE="${PACKAGE_NAME}-${VERSION}.vsix"
          if [ ! -f "$VSIX_FILE" ]; then
            echo "VSIX file not found: $VSIX_FILE" >&2
            echo "Available VSIX files:" >&2
            ls -la *.vsix >&2 || echo "No VSIX files found" >&2
            exit 1
          fi
          npx --yes @vscode/vsce publish --packagePath "$VSIX_FILE" --pat "$VSCE_PAT"

      - name: Publish to Open VSX marketplace
        if: success() && hashFiles('.semantic-release-success') != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          VSIX_FILE="${PACKAGE_NAME}-${VERSION}.vsix"
          if [ ! -f "$VSIX_FILE" ]; then
            echo "VSIX file not found: $VSIX_FILE" >&2
            exit 1
          fi
          npx --yes ovsx publish --packagePath "$VSIX_FILE" --pat "$OVSX_PAT"

      - name: Fetch latest GitHub release for Slack
        if: always() && hashFiles('.semantic-release-success') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/releases/latest" \
            --jq '{tag_name: .tag_name, body: (.body // ""), html_url: .html_url}' > release-meta.json

      - name: Build Slack payload
        if: always() && hashFiles('.semantic-release-success') != ''
        run: |
          jq -n --slurpfile meta release-meta.json '
            ($meta[0]) as $m |
            (($m.body) | if length > 2800 then .[0:2800] + "\n\n_…truncated_" else . end) as $bodySafe |
            {
              channel: "#alto9-tech-team",
              text: ("Forge " + $m.tag_name + " released"),
              blocks: [
                {
                  type: "header",
                  text: {type: "plain_text", text: ("Forge " + $m.tag_name), emoji: true}
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: (if ($bodySafe | length) > 0 then $bodySafe else "_No release notes provided._" end)
                  }
                },
                {
                  type: "context",
                  elements: [
                    {type: "mrkdwn", text: ("<" + $m.html_url + "|View release on GitHub>")}
                  ]
                }
              ]
            }
          ' > slack-payload.json

      - name: Post release to Slack
        if: always() && hashFiles('.semantic-release-success') != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: slack-payload.json
