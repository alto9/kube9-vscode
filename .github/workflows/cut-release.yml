# Manual release: semantic-release on the default branch, then publish VSIX to VS Code + Open VSX.
# No staging environment — CI on PRs/main validates builds. Fails if semantic-release creates no new tag.
name: Cut Release

on:
  workflow_dispatch:
    inputs:
      existing_tag:
        description: 'Publish artifacts for an existing tag (e.g. v1.38.0). Skips semantic-release.'
        required: false
        type: string

concurrency:
  group: cut-release-vscode
  cancel-in-progress: false

jobs:
  resolve_existing:
    name: Validate existing tag (republish)
    if: inputs.existing_tag != ''
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
    permissions:
      contents: read
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag exists on origin
        id: validate
        run: |
          set -euo pipefail
          TAG="${{ inputs.existing_tag }}"
          git fetch --tags origin
          if ! git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} not found on origin."
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Republishing existing tag: ${TAG}"

  release:
    name: Version and tag (semantic-release)
    if: inputs.existing_tag == ''
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: alto9
          repositories: |
            kube9-vscode

      - name: Capture existing tags (before semantic-release)
        run: |
          git fetch --tags origin
          git tag -l | sort -u > tags-before.txt

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:unit
        continue-on-error: true

      - name: Package extension (pre-release)
        run: npm run package

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: npx semantic-release

      - name: Sync default branch after release
        run: |
          git fetch origin "${{ github.event.repository.default_branch }}" --tags
          git checkout "${{ github.event.repository.default_branch }}"
          git pull --ff-only "origin/${{ github.event.repository.default_branch }}" || true

      - name: Detect newly created version tag
        id: meta
        run: |
          set -euo pipefail
          git fetch --tags origin
          sort -u tags-before.txt > tags-before-sorted.txt
          git ls-remote --tags origin 'v*' | awk '{print $2}' | sed 's|refs/tags/||' | sort -u > tags-after-remote.txt
          NEW_TAG=$(comm -13 tags-before-sorted.txt tags-after-remote.txt | head -n1 || true)
          if [[ -z "${NEW_TAG}" ]]; then
            echo "::error::semantic-release did not create a new tag. Nothing to publish."
            exit 1
          fi
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "New tag: ${NEW_TAG}"

  publish:
    name: Publish to marketplaces
    needs: [release, resolve_existing]
    if: ${{ !cancelled() && (needs.release.result == 'success' || needs.resolve_existing.result == 'success') }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.release.outputs.tag || needs.resolve_existing.outputs.tag }}
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension (post-release)
        run: |
          rm -f *.vsix
          npm run package

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is not set. Add it as an environment or repository secret." >&2
            exit 1
          fi
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          VSIX_FILE="${PACKAGE_NAME}-${VERSION}.vsix"
          if [ ! -f "$VSIX_FILE" ]; then
            echo "VSIX file not found: $VSIX_FILE" >&2
            ls -la *.vsix >&2 || echo "No VSIX files found" >&2
            exit 1
          fi
          npx --yes @vscode/vsce publish --packagePath "$VSIX_FILE" --pat "$VSCE_PAT"

      - name: Publish to Open VSX marketplace
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          VSIX_FILE="${PACKAGE_NAME}-${VERSION}.vsix"
          if [ ! -f "$VSIX_FILE" ]; then
            echo "VSIX file not found: $VSIX_FILE" >&2
            exit 1
          fi
          npx --yes ovsx publish --packagePath "$VSIX_FILE" --pat "$OVSX_PAT"

      - name: Fetch latest GitHub release for Slack
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/releases/latest" \
            --jq '{tag_name: .tag_name, body: (.body // ""), html_url: .html_url}' > release-meta.json

      - name: Build Slack payload
        if: success()
        run: |
          jq -n --arg repo "${{ github.event.repository.name }}" --slurpfile meta release-meta.json '
            ($meta[0]) as $m |
            (($m.body) | if length > 2800 then .[0:2800] + "\n\n_…truncated_" else . end) as $bodySafe |
            {
              channel: "#alto9-tech-team",
              text: ($repo + " " + $m.tag_name + " released"),
              blocks: [
                {
                  type: "header",
                  text: {type: "plain_text", text: ($repo + " " + $m.tag_name), emoji: true}
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: (if ($bodySafe | length) > 0 then $bodySafe else "_No release notes provided._" end)
                  }
                },
                {
                  type: "context",
                  elements: [
                    {type: "mrkdwn", text: ("<" + $m.html_url + "|View release on GitHub>")}
                  ]
                }
              ]
            }
          ' > slack-payload.json

      - name: Post release to Slack
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: slack-payload.json
