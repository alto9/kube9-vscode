# Package the extension after CI succeeds on the default branch (staging artifact), or run manually.
name: Deploy (Staging)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-vscode-staging-${{ github.event.workflow_run.head_branch || github.ref_name || 'manual' }}
  cancel-in-progress: false

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'master'))
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-${{ github.run_number }}
          path: '*.vsix'
          retention-days: 14
